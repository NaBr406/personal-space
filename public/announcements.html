<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告 - NaBr406</title>
  <script>(function(){try{var t=localStorage.getItem('site-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --card: rgba(0,0,0,0.03);
      --card-border: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.1);
      --nav-bg: rgba(245,245,247,0.72);
      --nav-border: rgba(0,0,0,0.06);
    }
    :root[data-theme="dark"] {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --text2: #86868b;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --nav-bg: rgba(5,5,5,0.72);
      --nav-border: rgba(255,255,255,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #050505;
        --card: rgba(255,255,255,0.04);
        --card-border: rgba(255,255,255,0.08);
        --text: #f5f5f7;
        --text2: #86868b;
        --accent: #3b82f6;
        --accent-glow: rgba(59,130,246,0.15);
        --nav-bg: rgba(5,5,5,0.72);
        --nav-border: rgba(255,255,255,0.06);
      }
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }

    /* 背景光晕 */
    .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 20s ease-in-out infinite; }
    :root[data-theme="dark"] .glow-orb { opacity: 0.3; }
    @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .glow-orb { opacity: 0.3; } }
    .glow-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%); top: -10%; left: -10%; }
    .glow-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%); bottom: 10%; right: -10%; animation-delay: -10s; }
    @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-30px) scale(1.05)} 66%{transform:translate(-20px,20px) scale(0.95)} }

    /* 导航栏 */
    nav { position: fixed; top: 0; width: 100%; background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--nav-border); z-index: 100; }
    .nav-inner { max-width: 980px; margin: 0 auto; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    .nav-logo { font-size: 17px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .theme-toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: transparent;
      color: var(--text2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); background: var(--card); }

    /* 主内容 */
    .main-wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 72px 20px 40px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .back-link { color: var(--text2); text-decoration: none; font-size: 13px; transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px; }
    .back-link:hover { color: var(--text); }

    /* 公告卡片 */
    .announce-list { display: flex; flex-direction: column; gap: 12px; }
    .announce-card {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 14px;
      padding: 20px 22px; cursor: pointer; backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .announce-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
    .announce-pinned { border-left: 3px solid var(--accent); }
    .announce-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .announce-pin { font-size: 11px; color: var(--accent); font-weight: 600; padding: 2px 8px; background: var(--accent-glow); border-radius: 6px; }
    .announce-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .announce-preview { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
    .announce-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text2); }
    .announce-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn-text { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--accent); padding: 4px 8px; border-radius: 6px; transition: background 0.2s; }
    .btn-text:hover { background: var(--accent-glow); }
    .btn-text.btn-danger { color: #ef4444; }
    .btn-text.btn-danger:hover { background: rgba(239,68,68,0.1); }
    .announce-empty { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 14px; }

    /* 详情 */
    .detail-card {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
      padding: 28px; backdrop-filter: blur(10px);
    }
    .detail-title { font-size: 22px; font-weight: 700; margin: 8px 0 14px; letter-spacing: -0.3px; }
    .detail-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text2); margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .detail-content { font-size: 14px; line-height: 1.9; color: var(--text); white-space: pre-wrap; word-break: break-word; }

    /* 发布表单 */
    .publish-form {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
      padding: 24px; backdrop-filter: blur(10px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .publish-form input, .publish-form textarea {
      width: 100%; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; background: var(--card); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit;
    }
    .publish-form input:focus, .publish-form textarea:focus { border-color: var(--accent); }
    .publish-form textarea { resize: vertical; min-height: 140px; line-height: 1.7; }
    .pin-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
    .btn-pub { padding: 11px 24px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-pub:hover { background: #60a5fa; }
    .btn-back { padding: 8px 16px; border: none; border-radius: 10px; background: rgba(255,255,255,0.08); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 24px; border-radius: 12px; font-size: 14px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 300; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Footer */
    footer { position: relative; z-index: 1; padding: 40px 24px; text-align: center; color: var(--text2); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    footer a { color: var(--text2); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    /* 渐入 */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* 响应式 */
    @media (max-width: 640px) {
      .main-wrap { padding: 60px 16px 30px; }
      .page-title { font-size: 20px; }
      .announce-card { padding: 16px; }
      .detail-card { padding: 20px; }
      .detail-title { font-size: 18px; }
      footer { padding: 24px 16px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow">
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
  </div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">NaBr406</a>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="/space/">空间</a>
        <a href="/space/announcements" class="active">公告</a>
        <button class="theme-toggle-btn" data-theme-toggle type="button" title="切换主题"></button>
      </div>
    </div>
  </nav>

  <div class="main-wrap">
    <div class="page-header">
      <h1 class="page-title">公告</h1>
      <button class="btn-pub" id="btnPublish" style="display:none" onclick="showPublishForm()">发布公告</button>
    </div>
    <div id="announceContent">
      <div class="announce-empty">加载中...</div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 NaBr406 · <a href="https://github.com/NaBr406">GitHub</a> · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">鄂ICP备2026008759号</a></p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/theme.js?v=2026030503"></script>
  <script>
    let currentUser = null;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 80);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    function observeNew() {
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => observer.observe(el));
    }

    async function checkLogin() {
      const token = localStorage.getItem("token");
      if (!token) return;
      try {
        const res = await fetch("/api/me", { headers: { "Authorization": "Bearer " + token } });
        if (res.ok) {
          currentUser = await res.json();
          currentUser.token = token;
          if (currentUser.role === "superadmin") document.getElementById("btnPublish").style.display = "";
        }
      } catch {}
    }

    function esc(text) { const d = document.createElement("div"); d.textContent = text; return d.innerHTML; }

    function fmtTime(s) {
      const d = new Date(s);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    async function loadList() {
      const c = document.getElementById("announceContent");
      try {
        const res = await fetch("/api/announcements");
        const data = await res.json();
        if (!data.announcements.length) { c.innerHTML = '<div class="announce-empty">暂无公告</div>'; return; }
        c.innerHTML = '<div class="announce-list">' + data.announcements.map(a => {
          const pin = a.pinned ? '<span class="announce-pin">置顶</span>' : '';
          const actions = currentUser && currentUser.role === "superadmin" ? `<div class="announce-actions"><button class="btn-text" onclick="event.stopPropagation();togglePin(${a.id})">${a.pinned?'取消置顶':'置顶'}</button><button class="btn-text btn-danger" onclick="event.stopPropagation();deleteAnnounce(${a.id})">删除</button></div>` : '';
          return `<div class="announce-card fade-in${a.pinned?' announce-pinned':''}" onclick="showDetail(${a.id})">
            <div class="announce-card-header">${pin}<span class="announce-title">${esc(a.title)}</span></div>
            <div class="announce-preview">${esc(a.content.slice(0,120))}${a.content.length>120?'...':''}</div>
            <div class="announce-meta"><span>${esc(a.author_name||'管理员')}</span><span>${fmtTime(a.created_at)}</span></div>
            ${actions}</div>`;
        }).join('') + '</div>';
        observeNew();
      } catch { c.innerHTML = '<div class="announce-empty" style="color:#ef4444">加载失败</div>'; }
    }

    async function showDetail(id) {
      const c = document.getElementById("announceContent");
      try {
        const res = await fetch(`/api/announcements/${id}`);
        const a = await res.json();
        c.innerHTML = `<div style="margin-bottom:16px"><button class="btn-back" onclick="loadList()">← 返回列表</button></div>
          <div class="detail-card fade-in">
            ${a.pinned?'<span class="announce-pin">置顶</span>':''}
            <h2 class="detail-title">${esc(a.title)}</h2>
            <div class="detail-meta"><span>${esc(a.author_name||'管理员')}</span><span>${fmtTime(a.created_at)}</span></div>
            <div class="detail-content">${esc(a.content).replace(/\n/g,'<br>')}</div>
          </div>`;
        observeNew();
      } catch { showToast("加载失败"); }
    }

    function showPublishForm() {
      const c = document.getElementById("announceContent");
      c.innerHTML = `<div style="margin-bottom:16px"><button class="btn-back" onclick="loadList()">← 返回列表</button></div>
        <div class="publish-form fade-in">
          <input type="text" id="aTitle" placeholder="公告标题" maxlength="100">
          <textarea id="aContent" placeholder="公告内容..." maxlength="5000" rows="8"></textarea>
          <label class="pin-label"><input type="checkbox" id="aPinned"> 置顶</label>
          <button class="btn-pub" onclick="submitAnnounce()">发布</button>
        </div>`;
      observeNew();
    }

    async function submitAnnounce() {
      const title = document.getElementById("aTitle").value.trim();
      const content = document.getElementById("aContent").value.trim();
      const pinned = document.getElementById("aPinned").checked;
      if (!title) return showToast("请输入标题");
      if (!content) return showToast("请输入内容");
      try {
        const res = await fetch("/api/announcements", {
          method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + currentUser.token },
          body: JSON.stringify({ title, content, pinned })
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        showToast("发布成功"); loadList();
      } catch (e) { showToast(e.message); }
    }

    async function deleteAnnounce(id) {
      if (!confirm("确定删除？")) return;
      try {
        const res = await fetch(`/api/announcements/${id}`, { method: "DELETE", headers: { "Authorization": "Bearer " + currentUser.token } });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        showToast("已删除"); loadList();
      } catch (e) { showToast(e.message); }
    }

    async function togglePin(id) {
      try {
        const res = await fetch(`/api/announcements/${id}/pin`, { method: "PATCH", headers: { "Authorization": "Bearer " + currentUser.token } });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        loadList();
      } catch (e) { showToast(e.message); }
    }

    checkLogin().then(() => loadList());
  </script>
</body>
</html>
