<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公告 - 我的空间</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .announce-wrap { max-width: var(--max-width); margin: 0 auto; padding: 16px; }
    .announce-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .announce-top h2 { font-size: 1.2rem; font-weight: 700; margin: 0; }
    .announce-top .btn { margin-left: auto; }
    .back-btn { display: inline-flex; align-items: center; gap: 4px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; padding: 6px 12px; border-radius: 8px; transition: background 0.2s; }
    .back-btn:hover { background: var(--border); }
    .announce-list { display: flex; flex-direction: column; gap: 10px; }
    .announce-card { background: var(--card-bg); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; }
    .announce-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); transform: translateY(-1px); }
    .announce-pinned { border-left: 3px solid var(--primary); background: linear-gradient(135deg, rgba(79,70,229,0.03), var(--card-bg)); }
    .announce-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .announce-pin { font-size: 0.75em; color: var(--primary); font-weight: 600; white-space: nowrap; }
    .announce-title { font-size: 1rem; font-weight: 600; margin: 0; color: var(--text); }
    .announce-preview { font-size: 0.88em; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
    .announce-meta { display: flex; gap: 12px; font-size: 0.78em; color: var(--text-secondary); }
    .announce-actions { display: flex; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .btn-text { background: none; border: none; cursor: pointer; font-size: 0.82em; color: var(--primary); padding: 2px 6px; border-radius: 4px; transition: background 0.15s; }
    .btn-text:hover { background: rgba(79,70,229,0.08); }
    .btn-text.btn-danger { color: #ef4444; }
    .btn-text.btn-danger:hover { background: rgba(239,68,68,0.08); }
    .announce-empty { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 0.95em; }
    .announce-detail-card { background: var(--card-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .announce-detail-title { font-size: 1.3rem; font-weight: 700; margin: 8px 0 12px; color: var(--text); }
    .announce-detail-meta { display: flex; gap: 12px; font-size: 0.82em; color: var(--text-secondary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .announce-detail-content { font-size: 0.95em; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .announce-form { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
    .announce-input { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.95em; outline: none; transition: border-color 0.2s; }
    .announce-input:focus { border-color: var(--primary); }
    .announce-textarea { padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.93em; outline: none; resize: vertical; min-height: 120px; font-family: inherit; line-height: 1.6; transition: border-color 0.2s; }
    .announce-textarea:focus { border-color: var(--primary); }
    .announce-pin-label { display: flex; align-items: center; gap: 6px; font-size: 0.88em; color: var(--text-secondary); cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg> 我的空间</h1>
    </div>
  </header>

  <div class="announce-wrap">
    <div class="announce-top">
      <a href="/" class="back-btn">← 返回</a>
      <h2><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="m3 11 18-5v12L3 13v-2z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg> 公告</h2>
      <button class="btn btn-primary btn-sm" id="btnPublish" style="display:none" onclick="showPublishForm()">发布公告</button>
    </div>
    <div id="announceContent">
      <div class="announce-empty">加载中...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentUser = null;

    // Check login
    async function checkLogin() {
      const token = localStorage.getItem("token");
      if (!token) return;
      try {
        const res = await fetch("/api/me", { headers: { "Authorization": "Bearer " + token } });
        if (res.ok) {
          currentUser = await res.json();
          currentUser.token = token;
          if (currentUser.role === "superadmin") {
            document.getElementById("btnPublish").style.display = "";
          }
        }
      } catch (e) {}
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(dateStr) {
      const d = new Date(dateStr);
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
      const h = String(d.getHours()).padStart(2,"0"), min = String(d.getMinutes()).padStart(2,"0");
      return `${y}-${m}-${day} ${h}:${min}`;
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    async function loadList() {
      const container = document.getElementById("announceContent");
      try {
        const res = await fetch("/api/announcements");
        const data = await res.json();
        if (!data.announcements.length) {
          container.innerHTML = '<div class="announce-empty"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 8px;opacity:0.4"><rect width="16" height="13" x="6" y="4" rx="2"/><path d="m22 7-7.1 3.78c-.57.3-1.23.3-1.8 0L6 7"/><path d="M2 8v11a2 2 0 0 0 2 2h16"/></svg>暂无公告</div>';
          return;
        }
        container.innerHTML = '<div class="announce-list">' + data.announcements.map(a => {
          const pinTag = a.pinned ? '<span class="announce-pin"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg> 置顶</span>' : "";
          const actions = currentUser && currentUser.role === "superadmin" ? `
            <div class="announce-actions">
              <button class="btn-text" onclick="event.stopPropagation();togglePin(${a.id})">${a.pinned ? "取消置顶" : "置顶"}</button>
              <button class="btn-text btn-danger" onclick="event.stopPropagation();deleteAnnounce(${a.id})">删除</button>
            </div>` : "";
          return `<div class="announce-card${a.pinned ? ' announce-pinned' : ''}" onclick="showDetail(${a.id})">
            <div class="announce-card-header">${pinTag}<h3 class="announce-title">${escapeHtml(a.title)}</h3></div>
            <div class="announce-preview">${escapeHtml(a.content.slice(0,100))}${a.content.length>100?'...':''}</div>
            <div class="announce-meta"><span>${escapeHtml(a.author_name||'管理员')}</span><span>${formatTime(a.created_at)}</span></div>
            ${actions}
          </div>`;
        }).join("") + '</div>';
      } catch (e) {
        container.innerHTML = '<div style="color:#ef4444;text-align:center;padding:40px">加载失败</div>';
      }
    }

    async function showDetail(id) {
      const container = document.getElementById("announceContent");
      try {
        const res = await fetch(`/api/announcements/${id}`);
        const a = await res.json();
        container.innerHTML = `
          <div style="margin-bottom:12px"><button class="back-btn" onclick="loadList()">← 返回列表</button></div>
          <div class="announce-detail-card">
            ${a.pinned ? '<span class="announce-pin"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg> 置顶</span>' : ''}
            <h2 class="announce-detail-title">${escapeHtml(a.title)}</h2>
            <div class="announce-detail-meta">
              <span>${escapeHtml(a.author_name||'管理员')}</span>
              <span>${formatTime(a.created_at)}</span>
            </div>
            <div class="announce-detail-content">${escapeHtml(a.content).replace(/\n/g,'<br>')}</div>
          </div>`;
      } catch (e) { showToast("加载失败"); }
    }

    function showPublishForm() {
      const container = document.getElementById("announceContent");
      container.innerHTML = `
        <div style="margin-bottom:12px"><button class="back-btn" onclick="loadList()">← 返回列表</button></div>
        <div class="announce-form">
          <input type="text" id="aTitle" placeholder="公告标题" maxlength="100" class="announce-input">
          <textarea id="aContent" placeholder="公告内容..." maxlength="5000" rows="8" class="announce-textarea"></textarea>
          <label class="announce-pin-label"><input type="checkbox" id="aPinned"> 置顶</label>
          <button class="btn btn-primary" onclick="submitAnnounce()">发布</button>
        </div>`;
    }

    async function submitAnnounce() {
      const title = document.getElementById("aTitle").value.trim();
      const content = document.getElementById("aContent").value.trim();
      const pinned = document.getElementById("aPinned").checked;
      if (!title) return showToast("请输入标题");
      if (!content) return showToast("请输入内容");
      try {
        const res = await fetch("/api/announcements", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + currentUser.token },
          body: JSON.stringify({ title, content, pinned })
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        showToast("发布成功"); loadList();
      } catch (e) { showToast(e.message); }
    }

    async function deleteAnnounce(id) {
      if (!confirm("确定删除？")) return;
      try {
        const res = await fetch(`/api/announcements/${id}`, {
          method: "DELETE", headers: { "Authorization": "Bearer " + currentUser.token }
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        showToast("已删除"); loadList();
      } catch (e) { showToast(e.message); }
    }

    async function togglePin(id) {
      try {
        const res = await fetch(`/api/announcements/${id}/pin`, {
          method: "PATCH", headers: { "Authorization": "Bearer " + currentUser.token }
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.error); }
        loadList();
      } catch (e) { showToast(e.message); }
    }

    // Init
    checkLogin().then(() => loadList());
  </script>
</body>
</html>
