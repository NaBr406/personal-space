<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态详情 - 我的空间</title>
  <script>(function(){try{var t=localStorage.getItem('site-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
  <link rel="stylesheet" href="/style.css">
  <style>
    .detail-wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: var(--border);
    }
    .detail-card {
      padding: 24px;
    }
    .detail-content {
      font-size: 1.05rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 16px;
    }
    .detail-image {
      margin-bottom: 16px;
    }
    .detail-image img {
      width: 100%;
      max-height: 600px;
      object-fit: contain;
      border-radius: 8px;
      cursor: pointer;
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .detail-loading {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-secondary);
    }
    .detail-error {
      text-align: center;
      padding: 60px 16px;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg> 我的空间</h1>
      <div class="header-actions">
        <button class="btn-icon" data-theme-toggle type="button" title="切换主题"></button>
      </div>
    </div>
  </header>

  <div class="detail-wrap">
    <a href="/" class="back-btn">← 返回</a>
    <div id="detail">
      <div class="detail-loading">加载中...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/theme.js?v=2026030503"></script>
  <script>
    const postId = window.location.pathname.split("/").pop();
    const detailEl = document.getElementById("detail");

    async function loadDetail() {
      try {
        // 记录浏览
        fetch(`/api/posts/${postId}/view`, { method: "POST" }).catch(() => {});

        const res = await fetch(`/api/posts/${postId}`);
        if (!res.ok) throw new Error("动态不存在");
        const post = await res.json();

        let contentHtml = "";
        if (post.content) {
          contentHtml = `<div class="detail-content">${escapeHtml(post.content)}</div>`;
        }

        let imageHtml = "";
        if (post.image) {
          imageHtml = `
            <div class="detail-image">
              <img src="${escapeHtml(post.image)}" alt="动态图片" onclick="window.open(this.src)">
            </div>`;
        }

        detailEl.innerHTML = `
          <div class="card detail-card">
            ${contentHtml}
            ${imageHtml}
            <div class="detail-meta">
              <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg> ${formatTime(post.created_at)}</span>
              <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg> ${post.views || 0} 次浏览</span>
            </div>
          </div>
        `;

        document.title = (post.content ? post.content.slice(0, 30) : "图片动态") + " - 我的空间";
      } catch (err) {
        detailEl.innerHTML = `<div class="detail-error">${err.message}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${d} ${h}:${min}`;
    }

    loadDetail();
  </script>
</body>
</html>
