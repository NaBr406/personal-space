<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的空间</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">✨ 我的空间</h1>
      <div class="header-actions">
        <button class="btn-icon" onclick="toggleSearch()" title="搜索">🔍</button>
        <button class="btn-icon" id="btnChangePwd" onclick="openChangePwd()" title="修改密码" style="display:none">🔐</button>
        <button class="btn-login" id="btnLogin" onclick="toggleAuth()">🔑 管理</button>
      </div>
    </div>
    <!-- 可折叠搜索栏 -->
    <div class="search-drawer" id="searchDrawer">
      <div class="search-drawer-inner">
        <label>从 <input type="date" id="searchStart"></label>
        <label>到 <input type="date" id="searchEnd"></label>
        <button class="btn btn-primary btn-sm" onclick="doSearch()">查找</button>
        <button class="btn btn-secondary btn-sm" onclick="clearSearch()">清除</button>
      </div>
    </div>
  </header>

  <!-- 管理员登录弹窗 -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h3>管理员登录</h3>
      <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="doLogin()">登录</button>
        <button class="btn btn-secondary" onclick="closeAuth()">取消</button>
      </div>
    </div>
  </div>

  
  <!-- 修改密码弹窗 -->
  <div class="modal-overlay" id="changePwdModal">
    <div class="modal">
      <h3>修改密码</h3>
      <input type="password" id="oldPwdInput" placeholder="当前密码">
      <input type="password" id="newPwdInput" placeholder="新密码">
      <input type="password" id="confirmPwdInput" placeholder="确认新密码">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="doChangePwd()">确认修改</button>
        <button class="btn btn-secondary" onclick="closeChangePwd()">取消</button>
      </div>
    </div>
  </div>

  <!-- 发布区域（仅管理员可见） -->
  <section class="publish-area" id="publishArea" style="display:none;">
    <div class="card publish-card">
      <textarea id="postContent" placeholder="记录此刻的想法..." rows="3"></textarea>
      <div class="publish-footer">
        <label class="upload-btn">
          📷 添加图片
          <input type="file" id="postImage" accept="image/*" hidden onchange="previewImage(this)">
        </label>
        <button class="btn btn-primary" onclick="submitPost()">发布</button>
      </div>
      <div class="image-preview" id="imagePreview" style="display:none;">
        <img id="previewImg" src="" alt="预览">
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
    </div>
  </section>

  <!-- 动态列表 -->
  <main class="feed" id="feed"></main>

  <!-- 加载更多 -->
  <div class="load-more" id="loadMore" style="display:none;">
    <button class="btn btn-secondary" onclick="loadPosts()">加载更多</button>
  </div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <p>📝 还没有动态，快来发布第一条吧～</p>
  </div>

  <!-- 提示消息 -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
