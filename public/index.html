<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的空间</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-inner">
      <a href="/" title="返回主站" style="color:var(--text-secondary);margin-right:8px;display:inline-flex;align-items:center;text-decoration:none;transition:color 0.2s" onmouseover="this.style.color="var(--text-primary)"" onmouseout="this.style.color="var(--text-secondary)""><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a><h1 class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg> 我的空间</h1>
      <div class="header-actions">
        <button class="btn-icon" onclick="toggleSearch()" title="搜索"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
        <button class="btn-icon" id="btnAdmin" onclick="showAdminPanel()" title="用户管理" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>

        <!-- 未登录 -->
        <div id="loginArea" style="display:flex;gap:6px;">
          <button class="btn btn-primary btn-sm" onclick="showAuthModal('login')">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showAuthModal('register')">注册</button>
        </div>

        <!-- 已登录 -->
        <div id="userArea" style="display:none;align-items:center;gap:8px;">
          <img id="userAvatar" src="/default-avatar.png" class="header-avatar" onclick="showProfile()">
          <span id="userNickname" class="header-nickname"></span>
          
        </div>
      </div>
    </div>
    <!-- 搜索栏 -->
    <div class="search-drawer" id="searchDrawer">
      <div class="search-drawer-inner">
        <label>从 <input type="date" id="searchStart"></label>
        <label>到 <input type="date" id="searchEnd"></label>
        <button class="btn btn-primary btn-sm" onclick="doSearch()">查找</button>
        <button class="btn btn-secondary btn-sm" onclick="clearSearch()">清除</button>
      </div>
    </div>
  </header>

  <!-- 登录/注册弹窗 -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h3 id="authTitle">登录</h3>
      <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
      <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
      <div id="inviteRow" style="display:none;">
        <input type="text" id="authInviteCode" placeholder="邀请码" autocomplete="off" style="text-transform:uppercase">
      </div>
      <div id="nicknameRow" style="display:none;">
        <input type="text" id="authNickname" placeholder="昵称（选填）">
        <div id="captchaRow" style="display:none;align-items:center;gap:8px;margin-top:4px">
          <span id="captchaQuestion" style="font-weight:600;white-space:nowrap"></span>
          <input type="text" id="captchaInput" placeholder="输入答案" style="width:100px" inputmode="numeric">
          <button type="button" class="btn btn-secondary btn-sm" onclick="refreshCaptcha()" style="white-space:nowrap">换一题</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="authSubmitBtn" onclick="doLogin()">登录</button>
        <button class="btn btn-secondary" onclick="closeAuthModal()">取消</button>
      </div>
      <div class="auth-switch" id="authSwitch"></div>
    </div>
  </div>

  <!-- 个人资料弹窗 -->
  <div class="modal-overlay" id="profileModal">
    <div class="modal">
      <h3>个人资料</h3>
      <div class="profile-avatar-wrap">
        <img id="profileAvatar" src="/default-avatar.png" class="profile-avatar">
        <label class="upload-btn-small">
          更换头像
          <input type="file" id="profileAvatarInput" accept="image/*" hidden onchange="previewProfileAvatar(this)">
        </label>
      </div>
      <input type="text" id="profileNickname" placeholder="昵称">
      <input type="password" id="profileNewPwd" placeholder="新密码（不改留空）">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveProfile()">保存</button>
        <button class="btn btn-secondary" onclick="closeProfile()">取消</button>
      </div>
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:center;">
        <button class="btn btn-danger btn-sm" onclick="confirmLogout()">退出登录</button>
      </div>
    </div>
  </div>

  <!-- 用户管理弹窗（超管） -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal modal-wide">
      <h3>用户管理</h3>
      <div id="userList" class="user-list"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeAdminPanel()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 发布区域 -->
  <section class="publish-area" id="publishArea" style="display:none;">
    <div class="card publish-card">
      <textarea id="postContent" placeholder="记录此刻的想法..." rows="3"></textarea>
      <div class="publish-footer">
        <label class="upload-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg> 添加图片
          <input type="file" id="postImage" accept="image/*" hidden onchange="previewImage(this)">
        </label>
        <button class="btn btn-primary" onclick="submitPost()">发布</button>
      </div>
      <div class="image-preview" id="imagePreview" style="display:none;">
        <img id="previewImg" src="" alt="预览">
        <button class="remove-img" onclick="removeImage()">✕</button>
      </div>
    </div>
  </section>

  <!-- 动态列表 -->
  <main class="feed" id="feed"></main>

  <!-- 加载更多 -->
  <div class="load-more" id="loadMore" style="display:none;">
    <button class="btn btn-secondary" onclick="loadPosts()">加载更多</button>
  </div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <p><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg> 还没有动态，快来发布第一条吧～</p>
  </div>

  <!-- 提示消息 -->
  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
