<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杂谈</title>
  <script>(function(){try{var t=localStorage.getItem('site-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" title="返回主站" style="color:var(--text-secondary);margin-right:8px;display:inline-flex;align-items:center;text-decoration:none;transition:color 0.2s"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
      <h1 class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M17 6.1H3"/><path d="M21 12.1H3"/><path d="M15.1 18H3"/></svg> 杂谈</h1>
      <div class="header-actions">
        <button class="btn-icon" data-theme-toggle type="button" title="切换主题"></button>
        <div id="loginArea" style="display:flex;gap:6px;">
          <button class="btn btn-primary btn-sm" onclick="goLogin()">登录</button>
        </div>
        <div id="userArea" style="display:none;align-items:center;gap:8px;">
          <img id="userAvatar" src="/default-avatar.png" class="header-avatar">
          <span id="userNickname" class="header-nickname"></span>
          <button class="btn btn-secondary btn-sm" onclick="doLogout()">退出</button>
        </div>
      </div>
    </div>
  </header>

  <div class="article-header">
    <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 杂谈</h2>
    <button class="btn btn-primary btn-sm" id="publishArticleBtn" style="display:none" onclick="showPublishForm()">写杂谈</button>
  </div>

  <div class="article-list" id="articleContainer"></div>
  <div class="load-more" id="loadMoreBtn" style="display:none;">
    <button class="btn btn-secondary" onclick="loadArticles()">加载更多</button>
  </div>
  <div class="toast" id="toast"></div>

  <script src="/theme.js?v=2026030503"></script>
  <script>window.ARTICLE_CATEGORY = 'chitchat';</script>
  <script src="/article.js?v=2026030505"></script>
</body>
</html>
